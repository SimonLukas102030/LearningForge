<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearningForge</title>

  <!-- Theme früh laden, damit kein Flackern -->
  <script>
    (function(){
      const t = document.cookie.split('; ').find(r=>r.startsWith('lf_theme='))?.split('=')[1];
      if(t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Web-Fonts (Maya v2 Phase-1.5 Performance-Sektion):
       - Inter: globaler Body-Font (Anvil-Default).
       - Crimson Text: Subject-Font fuer Geschichte + Latein (Serif-Identitaet).
       - JetBrains Mono: Subject-Font-Mono fuer Informatik-Code-Bloecke.
       Genau zwei zusaetzliche Web-Fonts, font-display:swap, kein FOIT.
       Preload nur die zwei wichtigsten Regular-Cuts; Italic/Bold lazy. -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="stylesheet" href="assets/css/main.css?v=20260509i">
  <link rel="stylesheet" href="assets/css/subject-tokens.css?v=20260509i">
  <link rel="stylesheet" href="assets/css/cosmetics.css?v=20260509i">
  <script>
    // Theme früh anwenden, vermeidet Flicker
    (function(){
      try {
        var t = localStorage.getItem('lf_app_theme');
        if (t) document.documentElement.setAttribute('data-app-theme', t);
      } catch {}
    })();
  </script>
</head>
<body>

  <!-- App-Container (alles wird per JS gerendert) -->
  <div id="app">
    <div class="splash">
      <!-- Splash-Logo: hardcoded inline-SVG (Lucide:zap). Cannot use lfIcon()
           here because assets/js/icons.js loads later via the module-graph;
           the splash must paint instantly with no JS. Stays in sync with
           assets/img/icons/lucide/zap.svg. -->
      <div class="splash-logo"><svg class="lf-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z" /></svg></div>
      <div class="splash-name">Learning<span>Forge</span></div>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Firebase (Compat-Version, kein Build-Step nötig) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- JSZip (Builder ZIP-Export) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <!-- App -->
  <script type="module" src="assets/js/main.js?v=20260509i"></script>

</body>
</html>
