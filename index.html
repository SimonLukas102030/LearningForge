<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearningForge</title>

  <!-- Theme früh laden, damit kein Flackern -->
  <script>
    (function(){
      const t = document.cookie.split('; ').find(r=>r.startsWith('lf_theme='))?.split('=')[1];
      if(t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css?v=20260422">
</head>
<body>

  <!-- App-Container (alles wird per JS gerendert) -->
  <div id="app">
    <div class="splash">
      <div class="splash-logo">⚡</div>
      <div class="splash-name">Learning<span>Forge</span></div>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Firebase (Compat-Version, kein Build-Step nötig) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- App -->
  <script type="module" src="assets/js/main.js"></script>

</body>
</html>
