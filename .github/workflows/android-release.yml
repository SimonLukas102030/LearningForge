name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Install rsvg-convert
        run: sudo apt-get install -y librsvg2-bin

      - name: Generate launcher icons from SVG
        run: |
          for dpi_size in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            dpi="${dpi_size%%:*}"
            size="${dpi_size##*:}"
            dir="android/app/src/main/res/mipmap-${dpi}"
            mkdir -p "$dir"
            rsvg-convert -w "$size" -h "$size" assets/icons/icon.svg \
              -o "$dir/ic_launcher.png"
            rsvg-convert -w "$size" -h "$size" assets/icons/icon-maskable.svg \
              -o "$dir/ic_launcher_round.png"
          done

      - name: Set version from tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION_NAME=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            echo "VERSION_NAME=${{ inputs.version_name }}" >> $GITHUB_ENV
          fi

      - name: Build debug APK
        working-directory: android
        run: gradle :app:assembleDebug

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             LearningForge-${{ env.VERSION_NAME }}.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LearningForge ${{ env.VERSION_NAME }}
          body: |
            ## LearningForge ${{ env.VERSION_NAME }}

            ### Installation
            1. Lade die `.apk` Datei herunter
            2. Öffne die Datei auf deinem Android-Gerät
            3. Falls nötig: Einstellungen → Sicherheit → "Unbekannte Quellen" aktivieren
            4. Installation bestätigen

            Erfordert Android 5.0 (Lollipop) oder neuer und eine aktive Internetverbindung.
          files: LearningForge-${{ env.VERSION_NAME }}.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
