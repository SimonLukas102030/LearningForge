name: Generate Keystore (einmalig ausführen)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias learningforge \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass learningforge123 \
            -keypass learningforge123 \
            -dname "CN=LearningForge, O=SimonsStudios, C=DE"

      - name: Print SHA-256 fingerprint
        run: |
          echo "========================================"
          echo "SHA-256 FINGERPRINT (fuer assetlinks.json):"
          echo "========================================"
          keytool -list -v -keystore keystore.jks -alias learningforge \
            -storepass learningforge123 | grep "SHA256:" | sed 's/.*SHA256: //'
          echo "========================================"

      - name: Print base64 keystore (fuer GitHub Secret KEYSTORE_BASE64)
        run: |
          echo "========================================"
          echo "KEYSTORE_BASE64 (als GitHub Secret speichern):"
          echo "========================================"
          base64 -w 0 keystore.jks
          echo ""
          echo "========================================"
